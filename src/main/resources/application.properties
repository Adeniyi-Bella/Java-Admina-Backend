# ==========================================
# CORE SPRING BOOT
# ==========================================
spring.application.name=api
spring.profiles.active=dev
spring.config.import=optional:file:.env[.properties]

# ==========================================
# SERVER & WEB
# ==========================================
spring.web.resources.add-mappings=false

# NEW: Tells Spring to securely parse X-Forwarded-For headers and strip spoofed IPs.
# This allows you to safely use `request.getRemoteAddr()` in your RateLimitFilter.
server.forward-headers-strategy=framework

# ==========================================
# SECURITY
# ==========================================
app.security.issuer-uri=${AZURE_ISSUER_URI}
app.security.audience=${AZURE_API_AUDIENCE}
app.security.allowed-origins=http://localhost:3000
app.security.public-endpoints=/actuator/info,/actuator/health

# ==========================================
# RATE LIMITING
# ==========================================
app.ratelimit.enabled=true
app.ratelimit.requests-per-minute=60
app.ratelimit.window-seconds=60

# ==========================================
# OBSERVABILITY & LOGGING
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
debug=false
logging.level.root=INFO
logging.level.com.admina.api=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=OFF
logging.level.org.springframework.boot.autoconfigure.condition=OFF
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF