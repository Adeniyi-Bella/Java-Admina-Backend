# ==========================================
# CORE SPRING BOOT
# ==========================================
spring:
  application:
    name: api
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: validate

  # ==========================================
  # WEB
  # ==========================================
  web:
    resources:
      add-mappings: false

  # ==========================================
  # FILE UPLOAD
  # ==========================================
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

# ==========================================
# SERVER
# ==========================================
server:
  forward-headers-strategy: framework

# ==========================================
# SECURITY
# ==========================================
app:
  security:
    issuer-uri: ${AZURE_ISSUER_URI}
    audience: ${AZURE_API_AUDIENCE}
    allowed-origins: http://localhost:3000
    public-endpoints:
      - /actuator/info
      - /actuator/health
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v3/api-docs
      - /api/v1/webhooks/stripe
    entra:
      tenant-id: ${AZURE_TENANT_ID}
      client-id: ${AZURE_CLIENT_ID}
      client-secret: ${AZURE_CLIENT_SECRET}
      validate-on-startup: true
      graph-base-url: https://graph.microsoft.com/v1.0
      login-base-url: https://login.microsoftonline.com

  # ==========================================
  # RATE LIMITING
  # ==========================================
  ratelimit:
    enabled: true
    requests-per-minute: 60
    window-seconds: 60
    exclude-paths:
      - /actuator/info
      - /actuator/health
      - /swagger-ui.html
      - /v3/api-docs
      - /api/v1/subscriptions/**
      - /api/v1/webhooks/stripe
  # ==========================================
  # STRIPE PAYMENTS
  # ==========================================
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    checkout-url: ${STRIPE_CHECKOUT_URL}
    price-ids:
      STANDARD: ${STRIPE_PRICE_STANDARD}
      PREMIUM: ${STRIPE_PRICE_PREMIUM}

  # ==========================================
  # DOCUMENT
  # ==========================================
  document:
    max-file-bytes: 6291456
    max-in-flight-documents: 40
    temp-dir: temp
    gemini-api-key: ${GEMINI_API_KEY}

# ==========================================
# OBSERVABILITY & LOGGING
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

debug: false

springdoc:
  default-produces-media-type: application/json

logging:
  level:
    root: INFO
    "[com.admina.api]": INFO
    "[org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver]": OFF
    "[org.springframework.boot.autoconfigure.condition]": OFF
    "[org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger]": OFF
    "[net.ttddyy.dsproxy.listener]": OFF
