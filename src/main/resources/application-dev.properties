logging.level.root=INFO
logging.level.com.admina.api=DEBUG
logging.level.com.zaxxer.hikari=INFO
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/user_db
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
app.notification.enabled=true
app.notification.resend.api-key=${RESEND_API_KEY:}
app.notification.resend.from-email=${RESEND_FROM_EMAIL:}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admina}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admina_password}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB
