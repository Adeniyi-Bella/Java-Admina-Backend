# ==========================================
# SERVER
# ==========================================
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/user_db
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# ==========================================
# RABBITMQ
# ==========================================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# ==========================================
# REDIS
# ==========================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# ==========================================
# SECURITY
# ==========================================
app.security.issuer-uri=${AZURE_ISSUER_URI}
app.security.audience=${AZURE_API_AUDIENCE}
app.security.allowed-origins=${ALLOWED_ORIGINS}
app.security.entra.tenant-id=${AZURE_TENANT_ID}
app.security.entra.client-id=${AZURE_CLIENT_ID}
app.security.entra.client-secret=${AZURE_CLIENT_SECRET}

# ==========================================
# RATE LIMITING
# ==========================================
app.ratelimit.requests-per-minute=30

# ==========================================
# STRIPE
# ==========================================
app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
app.stripe.checkout-url=${STRIPE_CHECKOUT_URL}
app.stripe.portal-return-url=${STRIPE_PORTAL_RETURN_URL}
app.stripe.price-ids.STANDARD=${STRIPE_PRICE_STANDARD}
app.stripe.price-ids.PREMIUM=${STRIPE_PRICE_PREMIUM}

# ==========================================
# DOCUMENT
# ==========================================
app.document.gemini-api-key=${GEMINI_API_KEY}

# ==========================================
# NOTIFICATION
# ==========================================
app.notification.enabled=true
app.notification.resend.api-key=${RESEND_API_KEY}
app.notification.resend.from-email=${RESEND_FROM_EMAIL}

# ==========================================
# LOGGING
# ==========================================
debug=false
logging.level.root=INFO
logging.level.com.admina.api=WARN

# ==========================================
# SPRINGDOC
# ==========================================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
