# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/user_db
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ==========================================
# RABBITMQ
# ==========================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admina}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admina_password}

# ==========================================
# REDIS
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==========================================
# SECURITY
# ==========================================
app.security.issuer-uri=${AZURE_ISSUER_URI}
app.security.audience=${AZURE_API_AUDIENCE}
app.security.allowed-origins=${ALLOWED_ORIGINS}
app.security.entra.tenant-id=${AZURE_TENANT_ID}
app.security.entra.client-id=${AZURE_CLIENT_ID}
app.security.entra.client-secret=${AZURE_CLIENT_SECRET}

# ==========================================
# RATE LIMITING
# ==========================================
app.ratelimit.requests-per-minute=60

# ==========================================
# STRIPE
# ==========================================
app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
app.stripe.checkout-url=${STRIPE_CHECKOUT_URL}
app.stripe.portal-return-url=${STRIPE_PORTAL_RETURN_URL}
app.stripe.price-ids.STANDARD=${STRIPE_PRICE_STANDARD}
app.stripe.price-ids.PREMIUM=${STRIPE_PRICE_PREMIUM}

# ==========================================
# DOCUMENT
# ==========================================
app.document.gemini-api-key=${GEMINI_API_KEY}

# ==========================================
# NOTIFICATION
# ==========================================
app.notification.enabled=false
app.notification.resend.api-key=${RESEND_API_KEY:}
app.notification.resend.from-email=${RESEND_FROM_EMAIL:}

# ==========================================
# LOGGING
# ==========================================
debug=false
logging.level.root=INFO
logging.level.com.admina.api=DEBUG
logging.level.com.zaxxer.hikari=INFO
